name: CI (vercel-build)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vercel-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Prisma reads DATABASE_URL/DIRECT_URL from env(). We don't need a real DB to generate/build,
      # but we do need valid-looking URLs so the CLI can parse the schema.
      - name: Create .env for CI
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://user:pass@localhost:5432/db?schema=public
          DIRECT_URL=postgresql://user:pass@localhost:5432/db?schema=public
          OPENAI_API_KEY=dummy
          OPENAI_MODEL=gpt-5
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Build (same as Vercel)
        run: npm run vercel-build
